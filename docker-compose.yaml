include:
  - vdb/${VDB_HOST}.yaml

x-ragondin: &ragondin_template
  build: 
    dockerfile: Dockerfile
  volumes:
    - ./model_weights:/app/model_weights
    - ./data:/app/data # PDF data for RAG
    - ./ragondin:/app/ragondin # For dev mode
  ports:
    - "${APP_PORT}:8080"
    - 8265:8265 # for ray
    - 8082:8081 # for ray
  env_file:
    - .env
  shm_size: 10.24gb
  
  depends_on:
    - ${VDB_HOST}


services:

  # GPU - default 
  ragondin:
    <<: *ragondin_template
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all 
              capabilities: [gpu]
    profiles:
      - ''  # Empty string gives default behavior (but does not run when cpu requested)

  # No GPU (docker compose --profile cpu up)
  ragondin-cpu:
    <<: *ragondin_template
    deploy: {}
    profiles:
      - 'cpu'

  prometheus:
    image: prom/prometheus
    volumes:
      - prometheus:/etc/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - TERM=linux
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-polystat-panel
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_COOKIE_SECURE=true
      - GF_SECURITY_COOKIE_SAMESITE=none
    ports:
      - '3000:3000'
    volumes:
      - 'grafana_storage:/var/lib/grafana'

volumes:
  prometheus:
  grafana_storage: